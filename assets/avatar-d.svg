<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A2A33"/>
      <stop offset="1" stop-color="#0E3D3A"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bgd)"/>
  <!-- 応援フラッグ -->
  <path d="M 138 44 L 138 96" stroke="#E8F4F8" stroke-width="6" stroke-linecap="round"/>
  <path d="M 138 46 L 176 56 L 138 68 Z" fill="#00B8D4"/>
  <!-- 父（どっしり立って応援） -->
  <g stroke="#E8F4F8" stroke-width="10" stroke-linecap="round" fill="none">
    <!-- 右腕（フラッグを掲げる） -->
    <path d="M 100 96 L 134 88"/>
    <!-- 左腕（腰） -->
    <path d="M 96 100 L 72 116"/>
    <!-- 胴体 -->
    <path d="M 96 94 L 96 140"/>
    <!-- 右脚 -->
    <path d="M 96 140 L 112 176"/>
    <!-- 左脚 -->
    <path d="M 96 140 L 80 176"/>
  </g>
  <!-- 頭（キャップ） -->
  <circle cx="96" cy="70" r="14" fill="#E8F4F8"/>
  <path d="M 82 64 Q 96 52 110 64" stroke="#00B8D4" stroke-width="8" stroke-linecap="round" fill="none"/>
</svg>
